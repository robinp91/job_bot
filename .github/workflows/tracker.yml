name: PAN Job Tracker

on:
  schedule:
    # Runs at 8 AM Central Time (1 PM UTC)
    # Adjust times to your preference using https://crontab.guru
    - cron: "0 13 * * *"

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  track-jobs:
    runs-on: ubuntu-latest

    # Give the workflow permission to push the updated seen_jobs.json back
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run job tracker
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: python tracker.py

      - name: Commit updated seen_jobs.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_jobs.json
          # Only commit if there's a change
          git diff --cached --quiet || git commit -m "chore: update seen jobs [skip ci]"
          git push
